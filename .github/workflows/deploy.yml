name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            bash /opt/service-zyx/deploy/deploy.sh
            echo "[actions] verify HEAD"
            git -C /opt/service-zyx rev-parse --short HEAD
            systemctl is-active service-zyx
