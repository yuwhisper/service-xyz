# Standalone HTTPS entry for Service XYZ admin UI (port 8443)
# Install: cp deploy/nginx-service-zyx.conf /etc/nginx/sites-available/service-zyx
#          ln -sf /etc/nginx/sites-available/service-zyx /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/service-zyx.crt;
    ssl_certificate_key /etc/nginx/ssl/service-zyx.key;

    location / {
        proxy_pass http://127.0.0.1:8800/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

