# Domain UI + API on www.ywzhaoran.xyz (merge into /etc/nginx/sites-available/ruoyi)
# Ozon 发货 wait=true 可能耗时数分钟，需加长 proxy 超时（默认 60s 会 504）

    # Ozon API — long-running shipment jobs
    location ~ ^/service/zyx/ozon(/|$) {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # Service XYZ API (match with or without trailing slash)
    location ~ ^/service/zyx/(auth|dashboard|apis|schedules|dingtalk|jst)(/|$) {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Service XYZ admin UI + static assets (/service/zyx/ -> backend /)
    location /service/zyx/ {
        rewrite ^/service/zyx/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /service/zyx {
        return 301 https://$host/service/zyx/;
    }
