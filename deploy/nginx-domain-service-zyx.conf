# Domain UI + API on www.ywzhaoran.xyz (merge into /etc/nginx/sites-available/ruoyi)

    # Service XYZ API (match with or without trailing slash)
    location ~ ^/service/zyx/(auth|dashboard|apis|schedules|ozon|dingtalk)(/|$) {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service XYZ admin UI + static assets (/service/zyx/ -> backend /)
    location /service/zyx/ {
        rewrite ^/service/zyx/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /service/zyx {
        return 301 https://$host/service/zyx/;
    }
